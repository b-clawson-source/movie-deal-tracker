<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscribed - Movie Deal Tracker</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 40px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .checkmark {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4aa 0%, #00b894 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 40px;
        }

        h1 {
            font-size: 1.75rem;
            margin-bottom: 16px;
        }

        p {
            color: #a0a0a0;
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .email {
            color: #00d4aa;
            font-weight: 500;
        }

        .next-steps {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 212, 170, 0.1);
            border-radius: 8px;
            text-align: left;
        }

        .next-steps h3 {
            font-size: 0.9rem;
            margin-bottom: 12px;
            color: #00d4aa;
        }

        .next-steps ul {
            list-style: none;
            padding: 0;
        }

        .next-steps li {
            padding: 6px 0;
            color: #ccc;
            font-size: 0.9rem;
            padding-left: 20px;
            position: relative;
        }

        .next-steps li::before {
            content: "\2022";
            position: absolute;
            left: 0;
            color: #00d4aa;
        }

        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #fff;
        }

        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }

            h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="checkmark">&#10003;</div>

            <h1>You're all set!</h1>

            <p>
                We'll send deal alerts to<br>
                <span class="email">{{ email }}</span>
            </p>

            <div class="next-steps">
                <h3>What happens next?</h3>
                <ul>
                    <li>We check your list daily for deals</li>
                    <li>You'll get an email when we find special editions under $20</li>
                    <li>Each email includes an unsubscribe link</li>
                </ul>
            </div>

            <a href="{{ url_for('index') }}" class="back-link">&larr; Track another list</a>
        </div>
    </div>
</body>
</html>
